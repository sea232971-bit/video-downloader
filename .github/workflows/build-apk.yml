name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Prepare source (use Kivy entry point)
        run: |
          cp main.py main_desktop.py.bak
          cp mobile_app.py main.py

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Buildozer global
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform
            .buildozer/android/platform
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git zip unzip \
            autoconf automake libtool libtool-bin \
            libltdl-dev libffi-dev libssl-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libz-dev \
            python3-pip python3-dev \
            libgles2-mesa-dev libegl1-mesa-dev \
            libmtdev-dev libxkbcommon-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.33

      - name: Build APK
        run: |
          set -o pipefail
          # Pre-download p4a so we can patch it
          mkdir -p .buildozer/android/platform
          cd .buildozer/android/platform
          if [ ! -d python-for-android/.git ]; then
            git clone -b master --single-branch --depth 1 https://github.com/kivy/python-for-android.git 2>&1
          fi
          cd python-for-android

          # Patch 1: fix hostpython3 version to match system Python 3.10
          # (master branch defaults to 3.14 which breaks Kivy 2.3.0 Cython compilation)
          sed -i 's/version = "3.14.2"/version = "3.10.12"/' pythonforandroid/recipes/hostpython3/__init__.py
          echo "hostpython3 version:"
          grep 'version = "' pythonforandroid/recipes/hostpython3/__init__.py | head -2

          # Patch 2: remove --recursive from sdl2_image recipe
          # (submodules reference skia.googlesource.com which may be unreachable)
          sed -i 's/clone_path, "--recursive"/clone_path/' pythonforandroid/recipes/sdl2_image/__init__.py
          echo "sdl2_image clone line:"
          grep 'clone_path' pythonforandroid/recipes/sdl2_image/__init__.py

          cd ../../..
          echo "=== Buildozer starting ==="
          yes | buildozer -v android debug 2>&1 | tee build.log
        timeout-minutes: 90

      - name: Restore original main.py
        if: always()
        run: |
          if [ -f main_desktop.py.bak ]; then
            mv main_desktop.py.bak main.py
          fi

      - name: Print build log tail on failure
        if: failure()
        run: |
          echo "=== Last 200 lines of build.log ==="
          tail -n 200 build.log 2>/dev/null || echo "build.log not found"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-downloader-apk
          path: bin/*.apk
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
