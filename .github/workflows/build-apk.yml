name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare source (use Kivy entry point)
        run: |
          cp main.py main_desktop.py.bak
          cp mobile_app.py main.py

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool libtool-bin \
            libltdl-dev libffi-dev libssl-dev \
            libncurses-dev libtinfo-dev cmake zlib1g-dev \
            openjdk-17-jdk \
            git zip unzip \
            python3-pip python3-dev \
            libgles2-mesa-dev libegl1-mesa-dev \
            libmtdev-dev libxkbcommon-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython

      - name: Build APK
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
        timeout-minutes: 60

      - name: Debug - print build log on failure
        if: failure()
        run: |
          echo "=== Build log (last 150 lines) ==="
          tail -n 150 build.log 2>/dev/null || echo "build.log not found"
          echo "=== End of log ==="

      - name: Debug - find APK files
        if: always()
        run: |
          echo "=== Java version ==="
          java -version 2>&1 || echo "java not found"
          echo "=== Python version ==="
          python --version
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo "=== Contents of bin/ ==="
          ls -la bin/ 2>/dev/null || echo "bin/ directory not found"
          echo "=== Contents of .buildozer/ ==="
          ls -la .buildozer/ 2>/dev/null || echo ".buildozer/ not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: video-downloader-apk
          path: bin/*.apk
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
